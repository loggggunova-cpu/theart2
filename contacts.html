<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>О студии</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Caveat:wght@500;600&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="styles/contacts.css" />
  </head>
  <body>
    <section class="founders">
      <div class="founders__block">
        <div class="founders__lead-block">
          <p class="founders__lead">Студия основана</p>

          <img
            src="./public/signature-about.svg"
            alt="Подпись основателя студии"
          />
        </div>

        <ul class="founders__list">
          <li class="founders__row">
            <span class="founders__name">Екатерина Л.</span>
            <span class="founders__rule founders__rule--short"></span>
            <span class="founders__role">основатель</span>
          </li>
          <li class="founders__row">
            <span class="founders__name">Камила Р.</span>
            <span class="founders__rule"></span>
            <span class="founders__role">дизайнер</span>
          </li>
          <li class="founders__row">
            <span class="founders__name">Нона А.</span>
            <span class="founders__rule"></span>
            <span class="founders__role">разработчик</span>
          </li>
        </ul>
      </div>
    </section>
    <div id="footer-placeholder" class="footer-placeholder"></div>
    <script src="./js/footer.js"></script>
  </body>
</html>
